<!DOCTYPE html>
<html>

<head>
    <title>AI Sentiment Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>😊 AI-Based Sentiment Analysis</h1>

    <form method="POST">

        <textarea
            name="text"
            rows="8"
            placeholder="Enter your social media post here..."
            required></textarea>

        <br><br>

        <button type="submit">Analyze Sentiment</button>

    </form>

    {% if prediction %}

        <h2>Prediction</h2>

        {% if prediction == "Positive" %}
            <h2 style="color:green;">😊 Positive</h2>

        {% elif prediction == "Negative" %}
            <h2 style="color:red;">😞 Negative</h2>

        {% else %}
            <h2 style="color:orange;">😐 Neutral</h2>

        {% endif %}

    {% endif %}

</div>

</body>
</html>
