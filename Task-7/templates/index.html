<!DOCTYPE html>
<html>

<head>
    <title>AI Handwritten Digit Recognition</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>✍️ AI Handwritten Digit Recognition</h1>

    <p>
        Enter <strong>64 comma-separated pixel values</strong>
        (values between 0 and 16).
    </p>

    <form method="POST">

        <textarea
            name="pixels"
            rows="8"
            placeholder="Example:
0,0,5,13,9,1,0,0,0,0,13,15,10,15,5,0,..."
            required></textarea>

        <br><br>

        <button type="submit">Predict Digit</button>

    </form>

    {% if prediction is not none %}

    <h2>Prediction</h2>

    <h1>{{ prediction }}</h1>

    {% endif %}

</div>

</body>
</html>
